version: '3.9'

services:
  # ── SkillForge AI Server ──────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    image: skillforge-ai:local
    container_name: skillforge-server
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASESERVICE_ROLE_KEY: ${SUPABASESERVICE_ROLE_KEY}
      FRONTEND_URL: http://localhost:5173
    volumes:
      - skillforge-data:/app/server/data
    networks:
      - skillforge-net
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Vite Dev Client (development only) ───────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: skillforge-client
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ./client/src:/app/src
    networks:
      - skillforge-net
    depends_on:
      server:
        condition: service_healthy
    profiles:
      - dev

  # ── Redis (optional caching layer) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: skillforge-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - skillforge-net
    profiles:
      - full

volumes:
  skillforge-data:
  redis-data:

networks:
  skillforge-net:
    driver: bridge
